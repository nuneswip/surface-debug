<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xmlns:termtosvg="https://github.com/nbedos/termtosvg"
     id="terminal"
     baseProfile="full"
     viewBox="0 0 703 404"
     width="703"
     version="1.1">

  <defs>
    <termtosvg:template_settings>
      <termtosvg:screen_geometry columns="82" rows="19"/>
      <termtosvg:animation type="css"/>
    </termtosvg:template_settings>

    <style type="text/css" id="generated-style"></style>

    <style type="text/css" id="user-style">
      /* Terminal text */
      #screen text {
        font-family: "JetBrains Mono", "Cascadia Code", "Fira Code", monospace;
        font-size: 12px !important;
        dominant-baseline: text-before-edge;
      }

      /* Window title */
      .title {
        fill: #c9d1d9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
        text-anchor: middle;
        dominant-baseline: central;
      }

      /* Base window background */
      .background { fill: #0d1117; }

      /* Terminal colors */
      .foreground { fill: #c9d1d9; }
      .color0 { fill: #484f58; }
      .color1 { fill: #ff7b72; }
      .color2 { fill: #3fb950; }
      .color3 { fill: #d29922; }
      .color4 { fill: #58a6ff; }
      .color5 { fill: #bc8cff; }
      .color6 { fill: #39c5cf; }
      .color7 { fill: #b1bac4; }
      .color8 { fill: #6e7681; }
      .color9 { fill: #ffa198; }
      .color10 { fill: #56d364; }
      .color11 { fill: #e3b341; }
      .color12 { fill: #79c0ff; }
      .color13 { fill: #d2a8ff; }
      .color14 { fill: #56d4dd; }
      .color15 { fill: #f0f6fc; }

      /* Additional style for prompt symbol */
      .prompt { fill: #58a6ff; }
      .cmd { fill: #c9d1d9; }
      .output { fill: #d29922; }
    </style>
  </defs>

  <!-- Fundo da janela -->
  <rect id="terminalui"
        class="background"
        width="100%"
        height="100%"
        ry="4.5826941"/>

  <!-- Botões da janela -->
  <circle cx="24" cy="23" r="7" class="color1"/>
  <circle cx="44" cy="23" r="7" class="color3"/>
  <circle cx="64" cy="23" r="7" class="color2"/>

  <!-- Título centralizado (caminho do arquivo) -->
  <text x="351.5" y="23" class="title">test-project › index.js  •  preview</text>

  <!-- Container do terminal com placeholder visual -->
  <svg id="screen"
       width="656"
       height="323"
       x="23"
       y="50"
       viewBox="0 0 656 323"
       preserveAspectRatio="xMidYMin slice">

    <!-- Conteúdo placeholder (será substituído pelo termtosvg ao gravar) -->
    <text x="10" y="18" class="prompt">➜</text>
    <text x="28" y="18" class="cmd">lua5.1 ./cli.lua --preset Medium /tmp/prom-readme/simple.lua --out /tmp/prom-readme/simple.obfuscated.lua</text>

    <text x="10" y="38" class="output">PROMETHEUS: Applying Obfuscation Pipeline to /tmp/prom-readme/simple.lua ...</text>
  </svg>

</svg>